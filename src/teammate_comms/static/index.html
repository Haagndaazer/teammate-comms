<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<!-- Locked-down CSP: no external origins, only same-origin fetch. Inline style/script
     are allowed (single bundled file), but an injected <img onerror>/<script src> cannot
     load or exfiltrate. ALL agent-authored text is rendered via textContent (never
     innerHTML), so stored XSS is defused. -->
<meta http-equiv="Content-Security-Policy"
      content="default-src 'none'; connect-src 'self'; style-src 'unsafe-inline'; script-src 'unsafe-inline'; img-src 'self'; base-uri 'none'; form-action 'none'">
<title>teammate-comms console</title>
<style>
  :root {
    --bg: #1a1d21; --panel: #20242a; --panel2: #262b32; --line: #343a42;
    --fg: #e8eaed; --dim: #9aa3ad; --accent: #4a9eff; --urgent: #ff6b6b;
    --on: #46d160; --off: #5a626c; --chip: #2f3640;
  }
  * { box-sizing: border-box; }
  html, body { height: 100%; margin: 0; }
  body {
    background: var(--bg); color: var(--fg);
    font: 14px/1.45 system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
    display: grid; grid-template-columns: 260px 1fr 340px; grid-template-rows: 1fr auto;
    height: 100vh;
  }
  #sidebar { grid-row: 1 / 3; background: var(--panel); border-right: 1px solid var(--line);
             overflow-y: auto; padding: 12px 0; }
  #sidebar h1 { font-size: 13px; margin: 0 0 10px 14px; letter-spacing: .3px; }
  .section { margin: 14px 0 4px; }
  .section .label { display: block; font-size: 11px; text-transform: uppercase; letter-spacing: .6px;
                    color: var(--dim); padding: 0 14px; margin-bottom: 4px; }
  .subhead { display: block; font-size: 11px; color: var(--dim); font-weight: 600; padding: 6px 14px 1px;
             opacity: .85; }
  .item { padding: 5px 14px; cursor: pointer; display: flex; align-items: center; gap: 7px;
          white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .item:hover { background: var(--panel2); }
  .item.active { background: var(--accent); color: #fff; }
  .item .pre { color: var(--dim); }
  .dot { width: 8px; height: 8px; border-radius: 50%; flex: 0 0 auto; background: var(--off); }
  .dot.on { background: var(--on); }
  img.avatar { width: 18px; height: 18px; border-radius: 50%; object-fit: cover; flex: 0 0 auto; opacity: .45; }
  img.avatar.on { opacity: 1; }
  .meta { color: var(--dim); font-size: 12px; }
  .item.active .meta { color: #e6f0ff; }
  .badge { margin-left: auto; background: var(--accent); color: #fff; border-radius: 9px;
           font-size: 11px; font-weight: 600; padding: 0 6px; min-width: 18px; text-align: center; }
  .item.active .badge { background: #fff; color: var(--accent); }
  #main { grid-row: 1; grid-column: 2; overflow-y: auto; padding: 16px 22px; }
  #convhead { font-size: 15px; font-weight: 600; margin: 0 0 4px; }
  #convsub { color: var(--dim); font-size: 12px; margin-bottom: 14px; }
  .banner { background: #3a2f10; color: #f0d890; padding: 6px 10px; border-radius: 6px;
            font-size: 12px; margin-bottom: 12px; }
  .msg { padding: 6px 0; }
  .msg .who { font-weight: 600; }
  .msg .when { color: var(--dim); font-size: 11px; margin-left: 8px; }
  .msg .body { white-space: pre-wrap; word-break: break-word; margin-top: 2px; }
  .msg.urgent { border-left: 3px solid var(--urgent); padding-left: 8px; margin-left: -11px; }
  .tag { color: var(--dim); font-size: 11px; margin-left: 8px; }
  .tag.pt { color: #8ab4f8; }
  .tag.mention { color: #ffd166; }
  .reply { color: var(--dim); font-size: 12px; margin-top: 1px; }
  .reads { color: var(--on); font-size: 11px; margin-top: 1px; }
  .rx { margin-top: 3px; display: flex; flex-wrap: wrap; gap: 4px; align-items: center; }
  .chip { background: var(--chip); border: 1px solid var(--line); border-radius: 10px;
          padding: 0 7px; font-size: 12px; cursor: pointer; line-height: 18px; }
  .chip.mine { border-color: var(--accent); }
  .bar { opacity: .35; }
  .msg:hover .bar { opacity: 1; }
  .bar .chip { background: transparent; border-color: transparent; }
  /* delete affordances + tombstone */
  .del { cursor: pointer; font-size: 12px; padding: 0 2px; opacity: .45; }
  .del:hover { opacity: 1; }
  .msg .del { margin-left: 8px; }
  .item .del { margin-left: 6px; opacity: 0; }
  .item:hover .del { opacity: .6; }
  .item .del:hover { opacity: 1; }
  .body.deleted, .fbody.deleted { color: var(--dim); font-style: italic; }
  #composewrap { grid-row: 2; grid-column: 2; border-top: 1px solid var(--line);
                 background: var(--panel); padding: 12px 22px; display: flex; gap: 10px;
                 flex-wrap: wrap; align-items: center; }
  #compose { flex: 1; min-width: 180px; background: var(--panel2); color: var(--fg);
             border: 1px solid var(--line);
             border-radius: 8px; padding: 9px 12px; font: inherit; resize: none; }
  #compose:disabled { opacity: .5; }
  #replychip { flex: 0 0 100%; display: flex; gap: 8px; align-items: center;
               font-size: 12px; opacity: .85; }
  #replychip[hidden] { display: none; }
  #replychip .rxclear { cursor: pointer; font-weight: 700; }
  #ptype, #urgwrap { background: var(--panel2); color: var(--fg); border: 1px solid var(--line);
                     border-radius: 8px; padding: 0 8px; font: inherit; font-size: 13px;
                     display: flex; align-items: center; gap: 5px; cursor: pointer; }
  #ptype:disabled, #urgwrap.disabled { opacity: .5; cursor: default; }
  #send { background: var(--accent); color: #fff; border: 0; border-radius: 8px;
          padding: 0 18px; font: inherit; font-weight: 600; cursor: pointer; }
  #send:disabled { opacity: .5; cursor: default; }
  .empty { color: var(--dim); margin-top: 30px; text-align: center; }
  /* D4: connection-status banner — fixed in the sidebar header, hidden until poll/roster
     fetch fails. textContent-only (no innerHTML), same CSP-clean discipline as everything else. */
  #status-banner { margin: 0 14px 10px; padding: 6px 10px; border-radius: 6px; font-size: 12px; }
  #status-banner[hidden] { display: none; }
  #status-banner.warn { background: #3a2f10; color: #f0d890; }
  #status-banner.err { background: #3a1010; color: #ff9d9d; }
  /* right-hand live activity firehose */
  #activity { grid-row: 1 / 3; grid-column: 3; background: var(--panel);
              border-left: 1px solid var(--line); display: flex; flex-direction: column; }
  #activity .ahead { padding: 10px 12px; border-bottom: 1px solid var(--line);
                     font-size: 11px; text-transform: uppercase; letter-spacing: .6px; color: var(--dim); }
  #feed { flex: 1; overflow-y: auto; padding: 8px 12px; }
  .frow { padding: 5px 0; border-bottom: 1px solid var(--line); font-size: 12.5px; }
  .frow .route { color: var(--dim); font-size: 11px; }
  .frow .arrow { color: var(--accent); }
  .frow .fbody { white-space: pre-wrap; word-break: break-word; margin-top: 1px; }
</style>
</head>
<body>
  <aside id="sidebar"><h1>teammate-comms</h1><div id="status-banner" hidden></div><div id="nav"></div></aside>
  <section id="main"><div class="empty">Select a conversation.</div></section>
  <div id="composewrap">
    <div id="replychip" hidden></div>
    <textarea id="compose" rows="1" placeholder="Message…" disabled></textarea>
    <select id="ptype" title="Post type (turns the thread into a decision trail)" disabled>
      <option value="">type…</option>
      <option value="decision">decision</option>
      <option value="blocker">blocker</option>
      <option value="fyi">fyi</option>
      <option value="chatter">chatter</option>
    </select>
    <label id="urgwrap" title="Send as urgent"><input type="checkbox" id="urgent" disabled> urgent</label>
    <button id="send" disabled>Send</button>
  </div>
  <aside id="activity">
    <div class="ahead">Live activity · all traffic (last 200)</div>
    <div id="feed"></div>
  </aside>

<script>
"use strict";
window.__TOKEN = "%TOKEN%";
try { history.replaceState(null, "", location.pathname); } catch (e) {}
const TOKEN = window.__TOKEN;
const EMOJI = { thumbsup: "👍", rofl: "🤣", smile: "😄", cry: "😢", "100": "💯", fire: "🔥" };

// `cursor` is an OPAQUE server token for the records stream (a byte "offset|generation" since
// P3) — NEVER parse or compare it here; just echo back whatever /api/poll returns. rcursor/dcursor
// stay id-based (reactions/deletions). The seen-set below dedupes a record the server re-serves on
// a transparent re-tail (transcript recreated), so no reload handling is needed client-side.
let ME = null, cursor = "", rcursor = "", dcursor = "", current = null;
const seen = new Set();              // message ids already ingested (dedupe)
const buckets = new Map();           // convId -> [records]
const convs = new Map();             // convId -> {label, sub, sendable}
const rx = new Map();                // msgId -> Map(emoji -> Set(reactor))
let groupReads = {};                 // "#g" -> {member: maxAckedId}
const lastRead = {};                 // convId -> max msg id the operator has viewed there
let firstPollDone = false;           // seed lastRead once the backlog has loaded
let transcriptEnabled = true;        // B4: set from /api/poll's fresh response (server knows)
const deleted = new Map();           // deleted target (msg id, or "#group"/"@name") -> by
// The transcript keeps the ORIGINAL body (we don't rewrite the firehose); the deletions
// sub-stream only marks ids, so the dashboard supplies its own placeholder. Mirrors
// comms.DELETED_MARKER; durable inbox/group reads carry the real marker for MCP surfaces.
const DELETED_TEXT = "— message deleted —";

const $ = (s) => document.querySelector(s);
const el = (t, c) => { const n = document.createElement(t); if (c) n.className = c; return n; };
const span = (c, txt) => { const s = el("span", c); s.textContent = txt; return s; };

async function api(path, opts) {
  const init = Object.assign({}, opts);
  init.headers = Object.assign({ "X-Dashboard-Token": TOKEN }, init.headers || {});
  const res = await fetch(path, init);
  if (!res.ok) {
    let msg = "HTTP " + res.status;                 // surface the server's reason if present
    try { const j = await res.json(); if (j && j.error) msg = j.error; } catch (e) {}
    const err = new Error(msg);
    err.status = res.status;                        // D4: lets callers distinguish 401 (dead
    throw err;                                       // token) from a transient network error
  }
  return res.json();
}

// D4: a stale token after a server restart (or any 401/500/network death) used to yield a
// silently frozen console (bare catch(e){}). setStatus renders a fixed banner (textContent
// only, CSP-clean); reportFetchError classifies 401 as PERMANENT (stop polling — a fresh
// teammate_dashboard call is required) vs anything else as transient (keep retrying at the
// existing poll cadence, which IS the retry).
let pollStopped = false;
function setStatus(text, kind) {
  const b = $("#status-banner");
  if (!text) { b.hidden = true; b.textContent = ""; b.className = ""; return; }
  b.textContent = text;
  b.className = kind || "warn";
  b.hidden = false;
}
function reportFetchError(e) {
  if (e && e.status === 401) {
    setStatus("Session token expired — the hosting instance restarted; re-run "
             + "teammate_dashboard for a fresh URL.", "err");
    pollStopped = true;
  } else {
    setStatus("Connection lost — retrying…", "warn");
  }
}

function convKey(rec) {
  if (rec.kind === "group" || rec.group) return rec.group;       // "#design"
  const a = rec.from, b = rec.to;
  if (a === ME || b === ME) return "@" + (a === ME ? b : a);     // my DM
  return "~" + [a, b].sort().join(" ↔ ");                  // observed agent↔agent
}

function ensureConv(id) {
  if (convs.has(id)) return;
  let label = id, sub = "", sendable = true;
  if (id[0] === "#") { sub = "group channel"; }
  else if (id[0] === "~") { label = id.slice(1); sub = "observed — read-only"; sendable = false; }
  else { label = id.slice(1); sub = "direct message"; }
  convs.set(id, { label, sub, sendable });
  renderNav();
}

function pushRecord(rec) {
  if (!rec || !rec.id || seen.has(rec.id)) return null;   // dedupe (poll boundary repeats)
  seen.add(rec.id);
  const id = convKey(rec);
  ensureConv(id);
  if (!buckets.has(id)) buckets.set(id, []);
  buckets.get(id).push(rec);
  renderFeed(rec);                                        // firehose: every NEW record
  return id;
}

function applyReactions(events) {
  for (const e of (events || [])) {
    if (!e.target || !e.emoji || !e.from) continue;
    if (!rx.has(e.target)) rx.set(e.target, new Map());
    const m = rx.get(e.target);
    if (!m.has(e.emoji)) m.set(e.emoji, new Set());
    if (e.op === "remove") m.get(e.emoji).delete(e.from);
    else m.get(e.emoji).add(e.from);
  }
}

// Deletion events: mark a target id deleted (idempotent), and on a whole-group delete
// drop that channel + its messages from the sidebar. Teammate removals reflect via the
// 5s roster refresh, so they need no message-level fold here.
function applyDeletions(events) {
  for (const e of (events || [])) {
    const t = e.target; if (!t) continue;
    deleted.set(t, e.by || "");
    if (e.kind === "group") {
      convs.delete(t); buckets.delete(t); delete lastRead[t]; delete groupReads[t];
      if (current === t) { current = null; renderTranscript(); }
    }
  }
}

// ── unread tracking (badges) ──
function maxId(msgs) { let m = ""; for (const r of msgs) if (r.id > m) m = r.id; return m; }
function unreadCount(convId) {
  const msgs = buckets.get(convId) || []; const lr = lastRead[convId] || "";
  let n = 0; for (const r of msgs) if (r.id > lr && r.from !== ME && !deleted.has(r.id)) n++;
  return n;
}
function markRead(convId) {
  const msgs = buckets.get(convId); if (msgs && msgs.length) lastRead[convId] = maxId(msgs);
}
function seedLastRead() { for (const [id, msgs] of buckets) lastRead[id] = maxId(msgs); }

// ── sidebar ──
async function loadConversations() {
  const d = await api("/api/conversations");
  ME = d.me;
  groupReads = {};
  const liveGroups = new Set((d.groups || []).map(g => g.id));
  for (const g of d.groups) { convs.set(g.id, { label: g.id, sub: g.members.length + " member(s)", sendable: true }); groupReads[g.id] = g.reads || {}; }
  // Reconcile: prune groups that no longer exist server-side (scoped to '#' keys only —
  // '@'/'~' convs are built from records, not this endpoint). So a deleted channel leaves
  // the sidebar instead of lingering. Clear its state + reset the pane if it was open.
  for (const k of [...convs.keys()]) {
    if (k[0] === "#" && !liveGroups.has(k)) {
      convs.delete(k); buckets.delete(k); delete lastRead[k]; delete groupReads[k];
      if (current === k) { current = null; renderTranscript(); }
    }
  }
  window.__roster = d.roster || [];
  window.__projects = d.projects || {};
  renderNav();
}

function renderNav() {
  const nav = $("#nav"); nav.textContent = "";
  const roster = window.__roster || [];
  const channels = [...convs.keys()].filter(k => k[0] === "#").sort();
  const observed = [...convs.keys()].filter(k => k[0] === "~").sort();

  nav.appendChild(section("Channels", channels.map(id => navItem(id, convs.get(id).label, null))));
  // Teammates = the sole DM entry point, grouped into project sub-sections so teammates
  // on the same project are together. (Online dot + you/🧑 markers per row.)
  const ts = el("div", "section");
  ts.appendChild(span("label", "Teammates"));
  if (!roster.length) ts.appendChild(span("item meta", "(none)"));
  const byProject = new Map();
  for (const r of roster) {
    const p = r.project || "(no project)";
    if (!byProject.has(p)) byProject.set(p, []);
    byProject.get(p).push(r);
  }
  const projOrder = [...byProject.keys()].sort((a, b) =>
    a === "(no project)" ? 1 : b === "(no project)" ? -1 : a.localeCompare(b));
  for (const p of projOrder) {
    const projMeta = (window.__projects || {})[p];
    const subLabel = projMeta
      ? p + (projMeta.summary ? " — " + projMeta.summary : "") + (projMeta.status && projMeta.status !== "active" ? " [" + projMeta.status + "]" : "")
      : p;
    ts.appendChild(span("subhead", subLabel));
    for (const r of byProject.get(p)) {
      const sub = r.agent === ME ? "(you)" : (r.type === "human" ? "🧑" : "");
      // removable: real offline-eligible teammates only — not you, not the human operator
      ts.appendChild(navItem("@" + r.agent, r.agent, r.online, sub, r.agent !== ME && r.type !== "human", r.avatar));
    }
  }
  nav.appendChild(ts);
  // Observed = read-only agent↔agent DMs, directly below Teammates
  nav.appendChild(section("Observed (read-only)", observed.map(id => navItem(id, convs.get(id).label, null))));
}

function section(label, items) {
  const s = el("div", "section");
  s.appendChild(span("label", label));
  if (!items.length) s.appendChild(span("item meta", "(none)"));
  for (const it of items) s.appendChild(it);
  return s;
}

function navItem(id, label, online, sub, removable, avatarHash) {
  const it = el("div", "item" + (id === current ? " active" : ""));
  if (online !== null && online !== undefined) {
    if (avatarHash) {
      const img = document.createElement("img");
      img.className = "avatar" + (online ? " on" : "");
      img.src = "/avatar?name=" + encodeURIComponent(id.slice(1)) + "&token=" + encodeURIComponent(TOKEN) + "&v=" + encodeURIComponent(avatarHash);
      img.alt = label;
      it.appendChild(img);
    } else {
      it.appendChild(el("span", "dot" + (online ? " on" : "")));
    }
  } else it.appendChild(span("pre", id[0] === "#" ? "#" : (id[0] === "~" ? "~" : "@")));
  it.appendChild(span(null, id[0] === "#" ? label.replace(/^#/, "") : label));
  if (sub) it.appendChild(span("meta", " " + sub));   // e.g. teammate's project
  // unread badge for channels + teammate DMs (never observed: no ME participant there)
  if (id[0] !== "~") { const n = unreadCount(id); if (n > 0) it.appendChild(span("badge", String(n))); }
  it.addEventListener("click", () => selectConv(id));
  if (removable) {
    const del = el("span", "del"); del.textContent = "🗑"; del.title = "Remove teammate " + label;
    del.addEventListener("click", (e) => { e.stopPropagation(); removeTeammate(label); });
    it.appendChild(del);
  }
  return it;
}

// ── center pane ──
function selectConv(id) {
  clearReplyTo();        // a reply intent is per-conversation — drop it on ANY switch (Slack
                         // semantics); otherwise a pending reply_to would attach a message id
                         // from the previous conversation, citing an id that isn't in this thread.
  current = id; ensureConv(id); markRead(id); renderNav(); renderTranscript();
  const c = convs.get(id) || {}; const ok = c.sendable !== false;
  $("#compose").disabled = !ok; $("#send").disabled = !ok;
  $("#ptype").disabled = !ok; $("#urgent").disabled = !ok;
  $("#urgwrap").classList.toggle("disabled", !ok);
  $("#compose").placeholder = ok ? ("Message " + (c.label || id) + "…") : "Read-only (you're not a participant)";
  if (ok) $("#compose").focus();
}

function fmtWhen(id) { const m = /T(\d{2}:\d{2}:\d{2})/.exec(id || ""); return m ? m[1] : ""; }

function renderTranscript() {
  const main = $("#main"); main.textContent = "";
  if (!current) { main.appendChild(span("empty", "Select a conversation.")); return; }
  const c = convs.get(current) || {};
  const head = el("div"); head.id = "convhead"; head.textContent = c.label || current; main.appendChild(head);
  const sub = el("div"); sub.id = "convsub"; sub.textContent = c.sub || ""; main.appendChild(sub);
  if (c.sendable === false) { const b = el("div", "banner"); b.textContent = "Read-only — you're not a participant in this conversation."; main.appendChild(b); }
  const msgs = buckets.get(current) || [];
  if (!msgs.length) {
    // B4: an empty transcript when TEAMMATE_TRANSCRIPT=0 used to render as an inexplicable
    // "No messages yet" indistinguishable from a bug — server tells us via /api/poll.
    const note = transcriptEnabled ? "No messages yet."
               : "Message history disabled (TEAMMATE_TRANSCRIPT=0) — live tombstones only.";
    main.appendChild(span("empty", note));
    return;
  }
  for (const rec of msgs) main.appendChild(renderMsg(rec));
  main.scrollTop = main.scrollHeight;
}

function renderMsg(rec) {
  const isDel = deleted.has(rec.id);
  const row = el("div", "msg" + (rec.priority === "urgent" && !isDel ? " urgent" : ""));
  const head = el("div");
  head.appendChild(span("who", rec.from));
  head.appendChild(span("when", fmtWhen(rec.id)));
  if (isDel) {                                  // tombstone: identity kept, body + extras suppressed
    row.appendChild(head);
    row.appendChild(span("body deleted", DELETED_TEXT));
    return row;
  }
  if (rec.kind === "group" && rec.group && current[0] !== "#") head.appendChild(span("tag", rec.group));
  if (rec.post_type) head.appendChild(span("tag pt", rec.post_type));
  if (rec.priority === "urgent") head.appendChild(span("tag", "URGENT"));
  if ((rec.mentions || []).includes(ME)) head.appendChild(span("tag mention", "🔔 you"));
  const reply = el("span", "del"); reply.textContent = "↳"; reply.title = "Reply to this message";
  reply.addEventListener("click", () => setReplyTo(rec.id));
  head.appendChild(reply);
  const del = el("span", "del"); del.textContent = "🗑"; del.title = "Delete this message";
  del.addEventListener("click", () => deleteMessage(rec.id));
  head.appendChild(del);
  row.appendChild(head);
  if (rec.reply_to) row.appendChild(span("reply", "↳ re " + rec.reply_to));
  row.appendChild(span("body", rec.message == null ? "" : String(rec.message)));
  // read receipts for group messages
  if (rec.group && groupReads[rec.group]) {
    const readers = Object.entries(groupReads[rec.group]).filter(([m, pos]) => pos && pos >= rec.id).map(([m]) => m);
    if (readers.length) row.appendChild(span("reads", "✓ read by " + readers.join(", ")));
  }
  row.appendChild(reactionFooter(rec.id));
  return row;
}

function reactionFooter(msgId) {
  const wrap = el("div", "rx");
  const m = rx.get(msgId);
  if (m) for (const [emoji, who] of m) {
    if (!who.size) continue;
    const chip = el("span", "chip" + (who.has(ME) ? " mine" : ""));
    chip.textContent = (EMOJI[emoji] || emoji) + " " + who.size;
    chip.title = [...who].join(", ");
    chip.addEventListener("click", () => toggleReact(msgId, emoji));
    wrap.appendChild(chip);
  }
  const bar = el("span", "bar");
  for (const name of Object.keys(EMOJI)) {
    const b = el("span", "chip"); b.textContent = EMOJI[name];
    b.addEventListener("click", () => toggleReact(msgId, name));
    bar.appendChild(b);
  }
  wrap.appendChild(bar);
  return wrap;
}

async function toggleReact(target, emoji) {
  const mine = rx.get(target)?.get(emoji)?.has(ME);
  // optimistic local update; the poll reconciles
  applyReactions([{ target, emoji, from: ME, op: mine ? "remove" : "add" }]);
  if (current) renderTranscript();
  try {
    await api("/api/react", { method: "POST", headers: { "Content-Type": "application/json" },
              body: JSON.stringify({ target, emoji, remove: !!mine }) });
  } catch (e) {
    // revert the optimistic apply, then surface the reason (B-3, N6) — no silent swallow.
    applyReactions([{ target, emoji, from: ME, op: mine ? "add" : "remove" }]);
    if (current) renderTranscript();
    alert("React failed: " + e.message);
  }
}

async function deleteMessage(id) {
  if (!confirm("Delete this message? It will show as deleted for everyone.")) return;
  deleted.set(id, ME);                                  // optimistic; the poll confirms
  if (current) renderTranscript();
  renderNav();
  try {
    await api("/api/delete", { method: "POST", headers: { "Content-Type": "application/json" },
              body: JSON.stringify({ message: id }) });
  } catch (e) { alert("Delete failed: " + e.message); }  // surface the real reason (N6)
}

async function removeTeammate(name) {
  if (!confirm("Remove teammate " + name + "?\nThis deletes their inbox + registry entry (offline teammates only).")) return;
  try {
    await api("/api/delete", { method: "POST", headers: { "Content-Type": "application/json" },
              body: JSON.stringify({ teammate: name }) });
    await loadConversations();                           // refresh roster immediately
  } catch (e) { alert("Remove failed: " + e.message); }
}

// ── right-hand firehose ──
function renderFeed(rec) {
  const feed = $("#feed");
  const nearBottom = feed.scrollHeight - feed.scrollTop - feed.clientHeight < 60;
  const row = el("div", "frow");
  const route = el("div", "route");
  route.appendChild(span(null, rec.from));
  route.appendChild(span("arrow", " → "));
  route.appendChild(span(null, rec.group ? rec.group : (rec.to || "?")));
  route.appendChild(span(null, "  " + fmtWhen(rec.id)));
  if (rec.post_type) route.appendChild(span(null, "  [" + rec.post_type + "]"));
  if (rec.priority === "urgent") route.appendChild(span(null, "  URGENT"));
  if ((rec.mentions || []).length) route.appendChild(span(null, "  🔔" + rec.mentions.join(",")));
  if (rec.reply_to) route.appendChild(span(null, "  ↳"));
  row.appendChild(route);
  const isDel = deleted.has(rec.id);
  row.appendChild(span("fbody" + (isDel ? " deleted" : ""),
                       isDel ? DELETED_TEXT : (rec.message == null ? "" : String(rec.message))));
  feed.appendChild(row);
  if (nearBottom) feed.scrollTop = feed.scrollHeight;   // don't yank a scrolled-up operator
}

// ── compose ──
let replyTo = null;                                   // pending reply target (a message id)
function setReplyTo(id) {
  replyTo = id;
  const chip = $("#replychip");
  chip.textContent = "↳ replying to " + id + "  ";
  const x = span("rxclear", "✕"); x.title = "Cancel reply";
  x.addEventListener("click", clearReplyTo);
  chip.appendChild(x);
  chip.hidden = false;
  $("#compose").focus();
}
function clearReplyTo() { replyTo = null; const c = $("#replychip"); c.hidden = true; c.textContent = ""; }

async function sendMsg() {
  const box = $("#compose"); const text = box.value.trim();
  if (!text || !current) return;
  const c = convs.get(current) || {}; if (c.sendable === false) return;
  const to = current[0] === "#" ? current : current.slice(1);
  const body = { to, message: text };
  const pt = $("#ptype").value; if (pt) body.post_type = pt;          // typed post (B-1)
  if ($("#urgent").checked) body.priority = "urgent";                // urgent (B-2)
  if (replyTo) body.reply_to = replyTo;                              // thread (B-1)
  box.value = "";
  try {
    await api("/api/send", { method: "POST", headers: { "Content-Type": "application/json" },
              body: JSON.stringify(body) });
    clearReplyTo();
    $("#urgent").checked = false;        // reset urgent each send; the type select stays sticky
  } catch (e) { box.value = text; alert("Send failed: " + e.message); }   // surface + restore (B-3, N6)
}
$("#send").addEventListener("click", sendMsg);
$("#compose").addEventListener("keydown", (e) => { if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); sendMsg(); } });

// ── poll loop ──
async function poll() {
  try {
    const d = await api("/api/poll?cursor=" + encodeURIComponent(cursor)
                        + "&rcursor=" + encodeURIComponent(rcursor)
                        + "&dcursor=" + encodeURIComponent(dcursor));
    let touched = false;
    // Apply deletions BEFORE pushing records, so a fresh-load backlog renders any
    // tombstoned message as deleted with no flash of its original body.
    const gotDeletions = (d.deletions || []).length > 0;
    if (gotDeletions) { applyDeletions(d.deletions); touched = true; }
    if (d.dcursor) dcursor = d.dcursor;
    const gotRecords = (d.records || []).length > 0;
    for (const rec of (d.records || [])) { if (pushRecord(rec) === current) touched = true; }
    if (d.cursor) cursor = d.cursor;
    if ((d.reactions || []).length) { applyReactions(d.reactions); touched = true; }
    if (d.rcursor) rcursor = d.rcursor;
    if (!firstPollDone) {
      seedLastRead(); firstPollDone = true;             // backlog isn't "unread"
      transcriptEnabled = d.transcript_enabled !== false; // B4
    }
    if (touched && current) { markRead(current); renderTranscript(); }  // viewing = read
    if (gotRecords || gotDeletions) renderNav();                   // refresh badges/sidebar
    setStatus(null);                                    // D4: clear the banner on success
  } catch (e) { reportFetchError(e); return; }           // D4: 401 stops polling permanently
  if (!pollStopped) setTimeout(poll, 1500);
}
async function refreshRoster() {
  try { await loadConversations(); } catch (e) { reportFetchError(e); }
  if (!pollStopped) setTimeout(refreshRoster, 5000);
}

(async function init() {
  try { await loadConversations(); } catch (e) { reportFetchError(e); }
  poll(); refreshRoster();
})();
</script>
