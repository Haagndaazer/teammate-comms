<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<!-- Locked-down CSP: no external origins, only same-origin fetch. Inline style/script
     are allowed (this is a single bundled file), but an injected <img onerror>/<script src>
     cannot load or exfiltrate. Message bodies are rendered via textContent (never innerHTML),
     so stored XSS from agent-authored text is defused. -->
<meta http-equiv="Content-Security-Policy"
      content="default-src 'none'; connect-src 'self'; style-src 'unsafe-inline'; script-src 'unsafe-inline'; img-src 'none'; base-uri 'none'; form-action 'none'">
<title>teammate-comms console</title>
<style>
  :root {
    --bg: #1a1d21; --panel: #20242a; --panel2: #262b32; --line: #343a42;
    --fg: #e8eaed; --dim: #9aa3ad; --accent: #4a9eff; --urgent: #ff6b6b;
    --on: #46d160; --off: #5a626c;
  }
  * { box-sizing: border-box; }
  html, body { height: 100%; margin: 0; }
  body {
    background: var(--bg); color: var(--fg);
    font: 14px/1.45 system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
    display: grid; grid-template-columns: 270px 1fr; grid-template-rows: 1fr auto;
    height: 100vh;
  }
  #sidebar {
    grid-row: 1 / 3; background: var(--panel); border-right: 1px solid var(--line);
    overflow-y: auto; padding: 12px 0;
  }
  #sidebar h1 { font-size: 13px; color: var(--fg); margin: 0 0 10px 14px; letter-spacing: .3px; }
  .section { margin: 14px 0 4px; }
  .section .label {
    font-size: 11px; text-transform: uppercase; letter-spacing: .6px;
    color: var(--dim); padding: 0 14px; margin-bottom: 4px;
  }
  .item {
    padding: 5px 14px; cursor: pointer; display: flex; align-items: center;
    gap: 7px; color: var(--fg); white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .item:hover { background: var(--panel2); }
  .item.active { background: var(--accent); color: #fff; }
  .item .pre { color: var(--dim); }
  .item.active .pre { color: #d7e8ff; }
  .dot { width: 8px; height: 8px; border-radius: 50%; flex: 0 0 auto; background: var(--off); }
  .dot.on { background: var(--on); }
  .meta { color: var(--dim); font-size: 12px; }
  .item.active .meta { color: #e6f0ff; }
  #main { grid-row: 1; overflow-y: auto; padding: 16px 22px; }
  #convhead { font-size: 15px; font-weight: 600; margin: 0 0 4px; }
  #convsub { color: var(--dim); font-size: 12px; margin-bottom: 14px; }
  .msg { padding: 6px 0; border-top: 1px solid transparent; }
  .msg .who { font-weight: 600; }
  .msg .when { color: var(--dim); font-size: 11px; margin-left: 8px; }
  .msg .body { white-space: pre-wrap; word-break: break-word; margin-top: 2px; }
  .msg.urgent { border-left: 3px solid var(--urgent); padding-left: 8px; margin-left: -11px; }
  .msg .tag { color: var(--dim); font-size: 11px; margin-left: 8px; }
  #composewrap {
    grid-row: 2; grid-column: 2; border-top: 1px solid var(--line);
    background: var(--panel); padding: 12px 22px; display: flex; gap: 10px;
  }
  #compose {
    flex: 1; background: var(--panel2); color: var(--fg); border: 1px solid var(--line);
    border-radius: 8px; padding: 9px 12px; font: inherit; resize: none;
  }
  #compose:disabled { opacity: .5; }
  #send {
    background: var(--accent); color: #fff; border: 0; border-radius: 8px;
    padding: 0 18px; font: inherit; font-weight: 600; cursor: pointer;
  }
  #send:disabled { opacity: .5; cursor: default; }
  .empty { color: var(--dim); margin-top: 30px; text-align: center; }
</style>
</head>
<body>
  <aside id="sidebar">
    <h1>teammate-comms</h1>
    <div id="nav"></div>
  </aside>
  <section id="main"><div class="empty">Select a conversation.</div></section>
  <div id="composewrap">
    <textarea id="compose" rows="1" placeholder="Message…" disabled></textarea>
    <button id="send" disabled>Send</button>
  </div>

<script>
"use strict";
// Token is injected by the server (the placeholder "%TOKEN%" — quotes included — is
// replaced with a JSON string literal). Strip it from the visible URL/history after load.
window.__TOKEN = "%TOKEN%";
try { history.replaceState(null, "", location.pathname); } catch (e) {}

const TOKEN = window.__TOKEN;
let ME = null;
let cursor = "";
const seen = new Set();                 // message ids already rendered (dedupe)
const buckets = new Map();              // convId -> [records]
const convs = new Map();                // convId -> {label, sub, sendable}
let current = null;

const $ = (sel) => document.querySelector(sel);
const el = (tag, cls) => { const n = document.createElement(tag); if (cls) n.className = cls; return n; };

async function api(path, opts) {
  const init = Object.assign({}, opts);
  init.headers = Object.assign({ "X-Dashboard-Token": TOKEN }, init.headers || {});
  const res = await fetch(path, init);
  if (!res.ok) throw new Error("HTTP " + res.status);
  return res.json();
}

function convKey(rec) {
  if (rec.kind === "group" || rec.group) return rec.group;           // "#design"
  const from = rec.from, to = rec.to;
  if (from === ME || to === ME) return "@" + (from === ME ? to : from);
  return "@" + [from, to].sort().join(" ↔ ");                   // observed agent↔agent
}

function ensureConv(id) {
  if (convs.has(id)) return;
  let label = id, sub = "", sendable = true;
  if (id.startsWith("#")) { label = id; sub = "group channel"; }
  else if (id.indexOf(" ↔ ") !== -1) { label = id.slice(1); sub = "observed (read-only)"; sendable = false; }
  else { label = id.slice(1); sub = "direct message"; }
  convs.set(id, { label, sub, sendable });
  renderNav();
}

function pushRecord(rec) {
  if (!rec || !rec.id) return false;
  if (seen.has(rec.id)) return false;
  seen.add(rec.id);
  const id = convKey(rec);
  ensureConv(id);
  if (!buckets.has(id)) buckets.set(id, []);
  buckets.get(id).push(rec);
  return id;
}

async function loadConversations() {
  const data = await api("/api/conversations");
  ME = data.me;
  // groups
  for (const g of data.groups) convs.set(g.id, { label: g.id, sub: g.members.length + " member(s)", sendable: true, members: g.members });
  // dm peers (roster minus me)
  for (const d of data.dms) if (!convs.has(d.id)) convs.set(d.id, { label: d.peer, sub: "direct message", sendable: true });
  window.__roster = data.roster || [];
  renderNav();
}

function renderNav() {
  const nav = $("#nav");
  nav.textContent = "";
  const roster = window.__roster || [];

  const groups = [...convs.entries()].filter(([id]) => id.startsWith("#"));
  const dms = [...convs.entries()].filter(([id]) => id.startsWith("@"));

  nav.appendChild(sectionEl("Channels", groups.map(([id, c]) => navItem(id, c.label, null)) ));
  nav.appendChild(sectionEl("Direct messages", dms.map(([id, c]) => navItem(id, c.label, null)) ));

  const rosterItems = roster.map((r) => {
    const it = navItem("@" + r.agent, r.agent, r.online);
    if (r.agent === ME) { const m = el("span", "meta"); m.textContent = " (you)"; it.appendChild(m); }
    else if (r.type === "human") { const m = el("span", "meta"); m.textContent = " 🧑"; it.appendChild(m); }
    return it;
  });
  nav.appendChild(sectionEl("Teammates", rosterItems));
}

function sectionEl(label, items) {
  const s = el("div", "section");
  const l = el("div", "label"); l.textContent = label; s.appendChild(l);
  if (!items.length) { const e = el("div", "item meta"); e.textContent = "(none)"; s.appendChild(e); }
  for (const it of items) s.appendChild(it);
  return s;
}

function navItem(id, label, online) {
  const it = el("div", "item" + (id === current ? " active" : ""));
  if (online !== null && online !== undefined) {
    const d = el("span", "dot" + (online ? " on" : "")); it.appendChild(d);
  } else {
    const p = el("span", "pre"); p.textContent = id.startsWith("#") ? "#" : "@"; it.appendChild(p);
  }
  const t = el("span"); t.textContent = id.startsWith("#") ? label.replace(/^#/, "") : label;
  it.appendChild(t);
  it.addEventListener("click", () => selectConv(id));
  return it;
}

function selectConv(id) {
  current = id;
  ensureConv(id);
  renderNav();
  renderTranscript();
  const c = convs.get(id) || {};
  const sendable = c.sendable !== false;
  $("#compose").disabled = !sendable;
  $("#send").disabled = !sendable;
  $("#compose").placeholder = sendable ? ("Message " + (c.label || id) + "…") : "Read-only (observed conversation)";
  if (sendable) $("#compose").focus();
}

function fmtWhen(id) {
  // ids are "YYYY-MM-DDTHH:MM:SS.ffffff" — show HH:MM:SS
  const m = /T(\d{2}:\d{2}:\d{2})/.exec(id || "");
  return m ? m[1] : "";
}

function renderTranscript() {
  const main = $("#main");
  main.textContent = "";
  if (!current) { const e = el("div", "empty"); e.textContent = "Select a conversation."; main.appendChild(e); return; }
  const c = convs.get(current) || {};
  const head = el("div"); head.id = "convhead"; head.textContent = c.label || current; main.appendChild(head);
  const sub = el("div"); sub.id = "convsub"; sub.textContent = c.sub || ""; main.appendChild(sub);

  const msgs = buckets.get(current) || [];
  if (!msgs.length) { const e = el("div", "empty"); e.textContent = "No messages yet."; main.appendChild(e); return; }
  for (const rec of msgs) main.appendChild(renderMsg(rec));
  main.scrollTop = main.scrollHeight;
}

function renderMsg(rec) {
  const row = el("div", "msg" + (rec.priority === "urgent" ? " urgent" : ""));
  const head = el("div");
  const who = el("span", "who"); who.textContent = rec.from;            // textContent — XSS-safe
  head.appendChild(who);
  const when = el("span", "when"); when.textContent = fmtWhen(rec.id); head.appendChild(when);
  if (rec.kind === "group" && rec.group && !String(current).startsWith("#")) {
    const tag = el("span", "tag"); tag.textContent = rec.group; head.appendChild(tag);
  }
  if (rec.priority === "urgent") { const tag = el("span", "tag"); tag.textContent = "URGENT"; head.appendChild(tag); }
  row.appendChild(head);
  const body = el("div", "body"); body.textContent = rec.message == null ? "" : String(rec.message);
  row.appendChild(body);
  return row;
}

async function poll() {
  try {
    const data = await api("/api/poll?cursor=" + encodeURIComponent(cursor));
    let touchedCurrent = false;
    for (const rec of (data.records || [])) {
      const convId = pushRecord(rec);
      if (convId && convId === current) touchedCurrent = true;
    }
    if (data.cursor) cursor = data.cursor;
    if (touchedCurrent) renderTranscript();
  } catch (e) { /* swallow, retry next tick */ }
  setTimeout(poll, 1500);
}

async function refreshRoster() {
  try { await loadConversations(); if (current) renderNav(); } catch (e) {}
  setTimeout(refreshRoster, 5000);
}

async function sendMsg() {
  const box = $("#compose");
  const text = box.value.trim();
  if (!text || !current) return;
  const c = convs.get(current) || {};
  if (c.sendable === false) return;
  const to = current.startsWith("#") ? current : current.slice(1);   // "#grp" or peer name
  box.value = "";
  try {
    await api("/api/send", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ to, message: text }),
    });
    // the next poll pulls it back from the transcript (single source of truth)
  } catch (e) {
    box.value = text;  // restore on failure
  }
}

$("#send").addEventListener("click", sendMsg);
$("#compose").addEventListener("keydown", (e) => {
  if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); sendMsg(); }
});

(async function init() {
  try { await loadConversations(); } catch (e) {}
  poll();
  refreshRoster();
})();
</script>
</body>
</html>
