name: CI

# Run the (zero-dependency, stdlib-only) handshake harness on both OSes. The harness drives
# the MCP server over a pipe and exercises the in-process unit blocks (storage, channel,
# dashboard HTTP, hooks). No secrets, no network.
on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

# Belt-and-suspenders for the Node-20 → Node-24 runtime cutover (GitHub forces Node 24 on JS
# actions from ~2026-06-16): make any action that still can't run on Node 24 FAIL the run loudly,
# instead of emitting the silent pre-cutover deprecation warning — so a green run PROVES Node 24,
# it isn't just "the action happened to work." Both actions below are already pinned to Node-24
# release commits; this is the trip-wire that keeps it that way.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  harness:
    name: harness (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      # Actions are SHA-pinned to their exact release commit (supply-chain hardening — a moving
      # tag can be force-moved into a false-green, the only thing this CI produces; the `# vX.Y.Z`
      # comment names the human-readable version). Both are Node-24 action majors (Node 20 is
      # deprecated on Actions runners). To bump: replace the SHA AND the version comment together.
      # NOTE: setup-uv v8 made full pins MANDATORY — it STOPPED publishing moving @v8/@v8.0 tags —
      # so there is no @v8 tag to chase; the SHA + `# vX.Y.Z` comment IS the version reference.
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
      - name: Sync environment
        run: uv sync
      # --no-sync: the env is already synced above; the harness imports only stdlib.
      - name: Run handshake harness
        run: uv run --no-sync python tests/test_handshake.py
