name: CI

# Run the (zero-dependency, stdlib-only) handshake harness on both OSes. The harness drives
# the MCP server over a pipe and exercises the in-process unit blocks (storage, channel,
# dashboard HTTP, hooks). No secrets, no network.
on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  harness:
    name: harness (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v5
      - name: Sync environment
        run: uv sync
      # --no-sync: the env is already synced above; the harness imports only stdlib.
      - name: Run handshake harness
        run: uv run --no-sync python tests/test_handshake.py
